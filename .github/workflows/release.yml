name: Release SocialBar

on:
  push:
    tags:
      - 'v*'   # triggers on any tag like v1.0.1, v2.0.0 etc

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Package and release to CurseForge
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CF_PROJECT_ID }}
